    <title>Kiwimu Passport | 會員入口與宇宙路由</title>

    <script>
      (() => {
        window.__PASSPORT_INITIAL_SEARCH__ = window.location.search;

        const sensitiveParams = ['claim', 'claim_code', 'code', 'reward'];
        const url = new URL(window.location.href);
        const hasSensitiveClaimParam = sensitiveParams.some((param) => url.searchParams.has(param));

        if (hasSensitiveClaimParam) {
          sensitiveParams.forEach((param) => url.searchParams.delete(param));
          const nextSearch = url.searchParams.toString();
          window.history.replaceState({}, '', `${url.pathname}${nextSearch ? `?${nextSearch}` : ''}${url.hash}`);
        }

        const privatePath = /^\/(redeem|join|passport)(\/|$)/.test(window.location.pathname);
        const privateQuery = window.__PASSPORT_INITIAL_SEARCH__.length > 1;

        if (privatePath || privateQuery) {
          const robots = document.querySelector('meta[name="robots"]') || document.createElement('meta');
          robots.setAttribute('name', 'robots');
          robots.setAttribute('content', 'noindex,nofollow');
          document.head.appendChild(robots);
        }
      })();
    </script>
